<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>sample0305.html</title>
</head>
<body>
    <h1>イベントリスナー</h1>
    <p><button id="btn1">クリック</button></p>

    <h1>フォームの操作</h1>
    <p>
        <input type="text" id="text_box1">
        <button id="btn2">クリック</button>
    </p>
    <form id="form1">
        <input type="checkbox" id="check1" value="野球">野球<br>
        <input type="checkbox" id="check2" value="サッカー">サッカー
    </form>
    <div>
        <h2>セレクトボックス</h2>
        <select id="select_box">
            <option value="fukuoka">福岡</option>
            <option value="nagasaki">長崎</option>
            <option value="saga">佐賀</option>
            <option value="kumamoto">熊本</option>
            <option value="ooita">大分</option>
            <option value="miyazaki">宮崎</option>
            <option value="kagoshima">鹿児島</option>
        </select>
    </div>

    <h1>日本で見られる金環日食</h1>
    <p>2030年6月1日、北海道で金環日食を観測できます。</p>
    <p>次の金環日食まで、あと<span id="num"></span>日です。</p>

    <h1>次の誕生日まで、あと何日?</h1>
    <p>誕生日は
        <select id="month"></select>月
        <select id="date"></select>日です。
    </p>
    <p><button id="btn3">日数を計算</button></p>
    <p id="result">ここに結果が表示されます。</p>

    <h1>今日の運勢</h1>
    <p>ボタンをクリックすると【今日の運勢】が表示されます。</p>
    <p><button id="btn4">運勢を占う!</button></p>
    <div id="result2">ここに結果が表示されます。</div>

    <h1>2つのサイコロ</h1>
    <p>ボタンをクリックすると、2つのサイコロを振ることができます。</p>
    <p><button id="btn5">サイコロを振る</button></p>
    <p>
        <img src="image/dice1.png" id="diceA" alt="">
        <img src="image/dice6.png" id="diceB" alt="">
    </p>

    <script>
        let str = 'ABCDEFGHIJK';
        console.log(str.length);
        console.log(str.toLowerCase());
        let str2 = 'abcdefghijk';
        console.log(str2.toUpperCase());
        console.log(str.indexOf('D',5));
        console.log(str.charAt(2));
        console.log(str.substring(5,2));
        console.log(str.slice(-2));
        let str3 = str.split('D');
        console.log(str3[0]);
        console.log(str3[1]);

        //P157演習問題
        document.getElementById('btn5')
            .addEventListener('click',rollDice);
        function rollDice(){
            //let n = Math.floor(Math.random() * 6) + 1;
            //let m = Math.floor(Math.random() * 6) + 1;
            let n = Math.ceil(Math.random() * 6);
            let m = Math.ceil(Math.random() * 6);
            let imgA = 'image/dice' + n + '.png';
            let imgB = 'image/dice' + m + '.png';
            document.getElementById('diceA')
                .setAttribute('src',imgA);
            document.getElementById('diceB')
                .setAttribute('src',imgB);
        }

        document.getElementById('btn4')
            .addEventListener('click',omikuji);
        function omikuji(){
            let list = [
                '【大吉】好きな人に出会えるかも!?',
                '【中吉】何事もなく過ぎていく普通の日',
                '【小吉】明日に期待しましょう!',
                '【凶】何をしても失敗ばかり・・・'
            ];
            let n = Math.random() * list.length;
            n = Math.floor(n);
            document.getElementById('result2')
                .textContent = list[n];
            this.setAttribute('disabled','disabled');
        }

        console.log(Math.floor(Math.random() * 6));

        let r = 5;
        console.log(r ** 2 * Math.PI);
        console.log(2 * Math.PI * r);
        let num = 3.57;
        //Math.floor → 切り捨て
        console.log('floor:' + Math.floor(num));
        //Math.ceil → 切り上げ
        console.log('ceil:' + Math.ceil(num));
        //Math.round → 四捨五入
        console.log('round:' + Math.round(num));
        num = Math.round(num);
        console.log('代入:' + num);

        //P151演習問題
        //月のoptionの作成
        let month = document.getElementById('month');
        for( let i=1;i<=12;i++ ){
            month.insertAdjacentHTML('beforeend',
                '<option value="' + i + '">' + i + '</option>');
        }
        
        //このページが表示されたときに表示する用に1回実行
        createDate();
        //月が選択されたらcreateDate関数を実行
        month.addEventListener('change',createDate);
        //ボタンを押したらshowDays関数を実行
        document.getElementById('btn3')
            .addEventListener('click',showDays);

        //日のoptionを作成する関数
        function createDate(){
            let date = document.getElementById('date');
            date.textContent = '';
            let nowDate = new Date();
            nowDate.setMonth(month.value - 1);
            //nowDate.setFullYear(2028);
            let lastdate = new Date(
                nowDate.getFullYear(),
                nowDate.getMonth() + 1,0);
            let dateNum = lastdate.getDate();
            for( let i=1;i<=dateNum;i++ ){
                date.insertAdjacentHTML('beforeend',
                    '<option value="' + i + '">' + i + '</option>');
            }
        }
        //誕生日までの日数を算出する関数
        function showDays(){
            let today = new Date();
            let birthday = new Date();
            let mm = month.value;
            let dd = date.value;
            birthday.setMonth(mm -1);
            birthday.setDate(dd);
            if( birthday <= today ){
                let yy = birthday.getFullYear();
                birthday.setFullYear(yy + 1);
            }
            let ms = birthday.getTime() - today.getTime();
            let days = Math.ceil( ms / (24 * 60 * 60 * 1000));
            document.getElementById('result')
                .textContent = '次の誕生日まで、あと' + days + '日です。';
        }

        let today = new Date();
        let theDay = new Date(2030,5,1);
        let ms = theDay.getTime() - today.getTime();
        let days = ms / (24 * 60 * 60 * 1000);
        days = Math.ceil(days);
        document.getElementById('num').textContent = days;

        //Dateオブジェクトの作成
        let now = new Date();
        console.log(now);
        let nowYear = now.getFullYear();
        let nowMonth = now.getMonth() + 1;
        let nowDate = now.getDate();
        let week = ['日','月','火','水','木','金','土'];
        console.log(nowYear + '年' + nowMonth + '月' + 
            nowDate + '日' + week[now.getDay()] + '曜日');
        console.log(now.getTime());

        //フォームの操作
        document.getElementById('select_box')
            .addEventListener('change',function(){
                console.log(this.value);
            });

        document.getElementById('form1')
            .addEventListener('change',function(){
                let check1 = document.getElementById('check1');
                if( check1.checked ){
                    console.log(check1.value);
                }
                let check2 = document.getElementById('check2');
                if( check2.checked ){
                    console.log(check2.value);
                }
            });

        let btn2 = document.getElementById('btn2');
        btn2.addEventListener('click',function(){
            let name = document.getElementById('text_box1').value;
            greet(name);
        });

        //イベントリスナー
        let btn1 = document.getElementById('btn1');
        btn1.addEventListener('click',function(){
            greet('たろう');
        });

        function greet(name){
            alert(name + 'さん、こんにちは');
        }
    </script>
</body>
</html>
